<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the page scale properly on different screen sizes. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dynamic Multiplication Table</title>

    <!-- jQuery UI stylesheet for sliders and tabs. -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">

    <!-- My custom stylesheet. -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="page-container">
        <h1>Dynamic Multiplication Table</h1>

        <p class="intro">
            Enter a range of row and column values to generate a multiplication table.
            Values must be whole numbers between -50 and 50.
        </p>

        <!-- jQuery UI tabs wrapper. The first tab holds the form and live preview. -->
        <div id="tabs">
            <ul>
                <li><a href="#mainTab">Table Generator</a></li>
            </ul>

            <!-- Main tab where the user enters values. -->
            <section id="mainTab">
                <!-- novalidate disables browser popup validation so jQuery Validation controls the messages. -->
                <form id="tableForm" novalidate>
                    <div class="form-group">
                        <label for="minCol">Minimum Column Value:</label>
                        <input type="number" id="minCol" name="minCol" value="1">
                        <div id="minColSlider" class="slider"></div>
                        <div class="error-area" id="minColError"></div>
                    </div>

                    <div class="form-group">
                        <label for="maxCol">Maximum Column Value:</label>
                        <input type="number" id="maxCol" name="maxCol" value="5">
                        <div id="maxColSlider" class="slider"></div>
                        <div class="error-area" id="maxColError"></div>
                    </div>

                    <div class="form-group">
                        <label for="minRow">Minimum Row Value:</label>
                        <input type="number" id="minRow" name="minRow" value="5">
                        <div id="minRowSlider" class="slider"></div>
                        <div class="error-area" id="minRowError"></div>
                    </div>

                    <div class="form-group">
                        <label for="maxRow">Maximum Row Value:</label>
                        <input type="number" id="maxRow" name="maxRow" value="8">
                        <div id="maxRowSlider" class="slider"></div>
                        <div class="error-area" id="maxRowError"></div>
                    </div>

                    <button type="submit">Save Table as New Tab</button>
                </form>

                <!-- Controls for deleting multiple saved table tabs. -->
                <section class="delete-panel">
                    <h2>Saved Table Options</h2>
                    <p>
                        Select saved tabs using the checkboxes in the tab labels, then delete them together.
                    </p>
                    <button type="button" id="deleteSelectedTabs">Delete Selected Tabs</button>
                </section>

                <!-- Live table preview changes whenever valid input or slider values change. -->
                <section class="preview-section">
                    <h2>Live Preview</h2>
                    <div id="tableContainer" class="table-container"></div>
                </section>
            </section>
        </div>
    </main>

    <!-- jQuery must load before the validation plugin and jQuery UI. -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery Validation plugin for assignment validation requirements. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>

    <!-- jQuery UI for sliders and tab widgets. -->
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>

    <!-- My custom JavaScript. -->
    <script src="js/script.js"></script>
</body>
</html>
